name: build-installer

# Push a tag like v0.1.0 to build the installer and attach it to the release.
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Generate icon
        run: python build/make_icon.py

      - name: Build exe (PyInstaller)
        run: pyinstaller build/crier.spec

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build\installer.iss

      - name: Publish installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Crier-Setup-*.exe
